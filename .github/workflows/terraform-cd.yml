name: CD - GCP IAM RBAC Google Groups (Apply / Destroy)

on:
  workflow_dispatch:
    inputs:
      command:
        description: Terraform operation
        required: true
        type: choice
        options:
          - apply
          - destroy
        default: apply
      project_id:
        description: GCP project ID
        required: true
        type: string
      region:
        description: GCP region
        required: true
        type: string
        default: us-central1
      team_permissions:
        description: Team permissions as HCL map of lists, e.g. {"group@x.com"=["role1","role2"]}
        required: false
        type: string
        default: '{"my-free-devops-team@googlegroups.com"=["roles/compute.admin","roles/run.admin","roles/cloudbuild.admin","roles/storage.admin"],"my-free-dev-team@googlegroups.com"=["roles/compute.viewer","roles/run.developer","roles/cloudbuild.editor","roles/storage.objectUser"]}'

env: {}

jobs:
  provision:
    name: Terraform ${{ github.event.inputs.command }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: latest
      - name: Terraform Init
        run: terraform init
      - name: Terraform Plan
        run: |
          terraform plan ${{ github.event.inputs.command == 'destroy' && '-destroy' || '' }} \
            -var="project_id=${{ github.event.inputs.project_id }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="team_permissions=${{ github.event.inputs.team_permissions }}"
      - name: Terraform Apply / Destroy
        run: |
          terraform ${{ github.event.inputs.command }} -auto-approve \
            -var="project_id=${{ github.event.inputs.project_id }}" \
            -var="region=${{ github.event.inputs.region }}" \
            -var="team_permissions=${{ github.event.inputs.team_permissions }}"
